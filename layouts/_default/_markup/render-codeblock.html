{{- $lang := .Attributes.lang | default .Type -}} {{- $file := .Attributes.file
-}}

<div class="highlight-wrapper">
  {{- if or $lang $file }}
  <div class="highlight-toolbar">
    {{- if $lang }}
    <span class="item">
      <span class="label">{{ $lang }}</span>
    </span>
    {{- end }} {{- with $file }}
    <span class="item">
      <span class="label">{{ . }}</span>
    </span>
    {{- end }}
  </div>
  {{- end }} {{- highlight .Inner $lang -}}
</div>
